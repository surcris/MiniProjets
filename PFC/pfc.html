<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pfc.css">
    <title>PFC</title>
</head>
<body>
    <div class="header">
        <a href="../mainPage.html">
            <div class="header-home">
                <img src="../images/home.png" alt="" width="50px">
            </div>
        </a>
        <h1>PROJETS</h1>
    </div>
    <div id="container">
        <div id="window-gamer">
            <div id="img-gamer">
                <img class="img" src="images/choix.jpg" alt="" srcset="">
            </div>
            <div id="choix">
                <button id="Pierre" onclick="pierre()">Pierre</button>
                <button id="Feuille" onclick="feuille()">Feuille</button>
                <button id="Ciseaux" onclick="ciseaux()">Ciseaux</button>
            </div>
        </div>
        <div id="menu">
            <button id="start" onclick="etatGame()">START</button>
            <div id="versus">
                <p>GAMER</p>
                <p>VS</p>
                <p>COMPUTER</p>
            </div>
            
            <div id="score">
                <p class="score">0</p>
                <p>:</p>
                <p class="score">0</p>
            </div>
            <div id="timer">0
                
            </div>
        </div>
        <div id="window-computer">
            <div id="img-computer">
                <img class="img" src="images/choix.jpg" alt="" srcset="">
            </div>
            <div id="choix-computer"></div>
        </div>
    </div>

    <script src="pfc.js"></script>
</body>
</html>
